site_name: ElephanTalk Documentation
site_description: Documentación oficial de ElephanTalk
site_author: ElephanTalk Team 2026
site_url: https://your-docs-site.com

theme:
  name: material
  language: es

  logo: assets/logo.png

  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Inicio: index.md
  - Comenzando:
    - Resumen: getting-started/index.md
    - Requerimientos del sistema: getting-started/system-requirements.md
    - Manual de usuario: getting-started/user-manual.md
  - Arquitectura:
    - Resumen: architecture/index.md
    - Patrones de diseño: architecture/design-patterns.md
    - Tecnologías: architecture/software-stack.md
  - Instalación y configuración:
    - Resumen: setup/index.md
    - Instalación Frontend: setup/frontend-setup.md
    - Instalación Backend: setup/backend-setup.md
  - Manual Técnico:
    - Introducción: technical/index.md
    - Frontend: technical/frontend.md
    - Backend: technical/backend.md
    - Base de Datos: technical/database.md
    - GeoJSON: technical/geojson.md
    - Machine Learning: technical/machine-learning.md
    - API REST: technical/api.md
    - Seguridad: technical/security.md
    - Despliegue: technical/deployment.md
  - Versiones:
    - Resumen: versions/index.md
    - Versión 1: versions/v1.md
    - Versión 2: versions/v2.md
    - V3 - Visibilidad Geográfica: versions/v3-geographic-visibility.md
    - Comparación: versions/comparison.md
  - Repositorios: repositories.md
  - Auditoría y compatibilidad de licencias:
    - Resumen: compatibility/index.md
    - Compatibilidad: compatibility/license-compatibility.md
  - Licencia: license.md


markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - git-revision-date-localized

extra_css:
  - css/extra.css